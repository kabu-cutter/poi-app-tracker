<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>案件一覧 - アプリ進行中</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header class="app-header">
    <h1>アプリ進行中</h1>
    <nav>
      <a href="edit.html">手入力で追加</a>
      <a href="privacy.html">プライバシー</a>
    </nav>
  </header>

  <main class="container">
    <section class="card intro-card backup-card">
      <div>
        <h2>案件一覧</h2>
        <p class="muted">記録はChromeのローカルストレージに保存されます。外部サーバーへの送信は行いません。</p>
      </div>
      <div class="backup-actions">
        <button id="exportCsv" class="secondary compact">CSV出力</button>
        <button id="exportJson" class="secondary compact emphasis">バックアップJSON出力</button>
        <button id="importJson" class="secondary compact">JSON復元</button>
        <input id="importFile" type="file" accept="application/json,.json" hidden />
      </div>
      <p id="backupMessage" class="message full-row"></p>
    </section>

    <section class="toolbar card">
      <input id="search" type="search" placeholder="アプリ名・サイト名・メモで検索" />
      <select id="statusFilter">
        <option value="">すべて</option>
        <option value="未インストール">未インストール</option>
        <option value="進行中">進行中</option>
        <option value="達成">達成</option>
        <option value="承認待ち">承認待ち</option>
        <option value="却下">却下</option>
        <option value="問い合わせ中">問い合わせ中</option>
        <option value="撤退">撤退</option>
        <option value="保留">保留</option>
      </select>
      <select id="sortMode">
        <option value="deadline">期限が近い順</option>
        <option value="updated">更新が新しい順</option>
        <option value="created">作成が新しい順</option>
        <option value="site">サイト名順</option>
      </select>
    </section>

    <section id="summary" class="summary-grid"></section>
    <section id="items" class="items"></section>
    <p id="empty" class="empty">まだ案件がありません。拡張ボタンから案件を記録してください。</p>
  </main>

  <script src="storage.js"></script>
  <script src="list.js"></script>
</body>
</html>
