<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>アプリ進行中</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body class="popup-body">
  <main class="popup">
    <h1>アプリ進行中</h1>
    <p class="muted">ポイ活ゲームアプリ案件を端末内に記録します。</p>
    <section id="popupBackupReminder" class="popup-reminder" hidden>
      <strong>バックアップ推奨</strong>
      <p>削除・入れ直しの前は、案件一覧からJSONバックアップを書き出してください。</p>
    </section>
    <button id="recordCurrent" class="primary">この案件を記録する</button>
    <button id="openList" class="secondary">案件一覧を開く</button>
    <button id="openPrivacy" class="ghost">プライバシー説明</button>
    <p id="message" class="message"></p>
  </main>
  <script src="popup.js"></script>
</body>
</html>
